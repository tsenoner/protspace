name: Bundle format contract (Python ↔ TypeScript)

# The .parquetbundle producer (apps/protspace, Python) and its consumer
# (packages/core data-loader, TypeScript) are tested by separate workflows whose
# path filters are mutually exclusive: ci.yml ignores apps/protspace/**, and
# protspace-ci.yml only runs for it. A contract test placed in either would be
# skipped by exactly the change most likely to break it.
#
# This job therefore lives on its own, installs both toolchains, and runs
# UNFILTERED — on every pull request, no `paths:` gate.
#
# That is deliberate, for two reasons:
#
# 1. It is a required status check. A path-filtered required check deadlocks:
#    GitHub waits forever for a report that a skipped workflow never sends, so
#    any PR outside the filter can never merge.
#
# 2. A hand-maintained filter is a hand-maintained copy of an import graph, and
#    it rots silently. The previous version of this file was already incomplete
#    on the day it was written — it missed the @protspace/utils barrel, the CLI
#    modules bundle.py imports, and the hyparquet pin in pnpm-lock.yaml. When a
#    filter is wrong the job does not fail; it simply does not run, which reads
#    exactly like "the contract still holds".
#
# The job is cheap enough to run every time: `uv sync --no-dev` installs 57
# packages rather than the 223 the dev group pulls, and the suite itself is ~4s.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contract:
    name: Bundle format contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - uses: actions/setup-python@v6
        with:
          python-version-file: 'apps/protspace/pyproject.toml'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Both toolchains are required. The suite must never degrade to a skip when
      # one is missing — an absent producer has to fail the job, not pass it.
      #
      # --no-dev: the contract path needs pyarrow + typer + the protspace CLI and
      # nothing else. The dev group pulls torch and 15 nvidia-* CUDA wheels (223
      # packages vs 57), none of which this job imports — gigabytes of download
      # and cache pressure for a four-second test.
      - name: Install Python producer
        run: uv sync --package protspace --no-dev

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run bundle format contract
        run: pnpm test:contract
