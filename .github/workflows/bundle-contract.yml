name: Bundle format contract (Python ↔ TypeScript)

# The .parquetbundle producer (apps/protspace, Python) and its consumer
# (packages/core data-loader, TypeScript) are tested by separate workflows whose
# path filters are mutually exclusive: ci.yml ignores apps/protspace/**, and
# protspace-ci.yml only runs for it. A contract test placed in either would be
# skipped by exactly the change most likely to break it.
#
# This job therefore lives on its own, installs both toolchains, and runs
# UNFILTERED — on every pull request, no `paths:` gate.
#
# That is deliberate, for two reasons:
#
# 1. It is meant to be a required status check, and a path-filtered required
#    check deadlocks: GitHub waits forever for a report that a skipped workflow
#    never sends, so any PR outside the filter can never merge. (Marking it
#    required is a repo-settings change, made once after this lands — until
#    then the job reports but does not gate. Do not re-add a `paths:` filter to
#    save CI minutes without also un-requiring the check.)
#
# 2. A filter here would be a hand-maintained copy of an import graph, and it
#    would rot silently. To stay correct it would have to enumerate the
#    @protspace/utils barrel, the CLI modules bundle.py imports, and the
#    hyparquet pin in pnpm-lock.yaml — and track them as they move. When a
#    filter is wrong the job does not fail; it simply does not run, which reads
#    exactly like "the contract still holds".
#
# Cost: ~1 minute, about half of it the Python generator that writes the fixture
# bundles by invoking the real `protspace bundle` CLI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contract:
    name: Bundle format contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
          # setup-uv defaults to `uv cache prune --ci`, which discards prebuilt
          # wheels and keeps only source builds. This dependency tree is all
          # wheels, so pruning leaves the cache near-empty and every run
          # re-downloads numpy/scipy/pandas/pyarrow/scikit-learn.
          prune-cache: false

      # Pin to .python-version (3.12), NOT pyproject.toml. pyproject declares
      # `requires-python = ">=3.10"`, from which setup-python installs the newest
      # satisfying release — it picked 3.14.6, a version no other job in this repo
      # tests. For a required check that means the interpreter floats with the
      # runner image, and a new release with lagging numba/llvmlite/pyarrow wheels
      # would block every merge with no code change.
      - uses: actions/setup-python@v6
        with:
          python-version-file: 'apps/protspace/.python-version'

      # pnpm/action-setup must precede setup-node so `cache: 'pnpm'` can resolve
      # the store path. setup-node's built-in cache replaces the hand-rolled
      # `pnpm store path` + actions/cache pair duplicated across the other
      # workflows. The pnpm version comes from package.json `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Both toolchains are required. The suite must never degrade to a skip when
      # one is missing — an absent producer has to fail the job, not pass it.
      #
      # --no-dev: the contract path needs pyarrow + typer + the protspace CLI and
      # nothing else. The dev group pulls torch and 15 nvidia-* CUDA wheels (223
      # packages vs 57), none of which this job imports.
      # --locked: fail if uv.lock has drifted from pyproject rather than silently
      # resolving different versions than we pinned.
      #
      # NOTE: the test's own `uv run` must repeat --no-dev, or it re-syncs to the
      # default group set and undoes this. See bundle.contract.test.ts.
      - name: Install Python producer
        run: uv sync --package protspace --no-dev --locked

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run bundle format contract
        run: pnpm test:contract
