name: Bundle format contract (Python ↔ TypeScript)

# The .parquetbundle producer (apps/protspace, Python) and its consumer
# (packages/core data-loader, TypeScript) are tested by separate workflows whose
# path filters are mutually exclusive: ci.yml ignores apps/protspace/**, and
# protspace-ci.yml only runs for it. A contract test placed in either would be
# skipped by exactly the change most likely to break it.
#
# This workflow's filter is therefore the UNION of both sides plus the suite
# itself, and it is the only job that installs both toolchains. Keep the filter
# in sync when either side's format code moves.

on:
  push:
    branches: [main]
    paths:
      - 'apps/protspace/src/protspace/data/io/**'
      - 'apps/protspace/src/protspace/data/annotations/**'
      # The generator shells out to `protspace bundle` by bare name, so the whole
      # CLI package matters: bundle.py's own imports (app.py, common_options.py)
      # and pyproject.toml's [project.scripts] entry that puts it on PATH.
      - 'apps/protspace/src/protspace/cli/**'
      - 'apps/protspace/pyproject.toml'
      - 'packages/core/src/components/data-loader/**'
      # bundle.ts feeds settings through sanitizePublishState from publish/.
      - 'packages/core/src/components/publish/**'
      # The suite aliases @protspace/utils to the package root, so its barrel
      # (index.ts) and everything the barrel re-exports is in the tested graph —
      # not just parquet/. conversion.ts also decodes annotations via
      # normalizeMissingValue/NA_VALUE from visualization/, which is what makes
      # the "missing numeric stays missing" assertion meaningful.
      - 'packages/utils/src/**'
      - 'tests/contract/**'
      # hyparquet is the decoder under test; a bump belongs in this job's scope.
      # The root package.json defines the `test:contract` script the job runs.
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'uv.lock'
      - '.github/workflows/bundle-contract.yml'
  pull_request:
    paths:
      - 'apps/protspace/src/protspace/data/io/**'
      - 'apps/protspace/src/protspace/data/annotations/**'
      # The generator shells out to `protspace bundle` by bare name, so the whole
      # CLI package matters: bundle.py's own imports (app.py, common_options.py)
      # and pyproject.toml's [project.scripts] entry that puts it on PATH.
      - 'apps/protspace/src/protspace/cli/**'
      - 'apps/protspace/pyproject.toml'
      - 'packages/core/src/components/data-loader/**'
      # bundle.ts feeds settings through sanitizePublishState from publish/.
      - 'packages/core/src/components/publish/**'
      # The suite aliases @protspace/utils to the package root, so its barrel
      # (index.ts) and everything the barrel re-exports is in the tested graph —
      # not just parquet/. conversion.ts also decodes annotations via
      # normalizeMissingValue/NA_VALUE from visualization/, which is what makes
      # the "missing numeric stays missing" assertion meaningful.
      - 'packages/utils/src/**'
      - 'tests/contract/**'
      # hyparquet is the decoder under test; a bump belongs in this job's scope.
      # The root package.json defines the `test:contract` script the job runs.
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'uv.lock'
      - '.github/workflows/bundle-contract.yml'
  workflow_dispatch:

jobs:
  contract:
    name: Bundle format contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - uses: actions/setup-python@v6
        with:
          python-version-file: 'apps/protspace/pyproject.toml'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Both toolchains are required. The suite must never degrade to a skip when
      # one is missing — an absent producer has to fail the job, not pass it.
      #
      # --no-dev: the contract path needs pyarrow + typer + the protspace CLI and
      # nothing else. The dev group pulls torch and 15 nvidia-* CUDA wheels (223
      # packages vs 57), none of which this job imports — gigabytes of download
      # and cache pressure for a four-second test.
      - name: Install Python producer
        run: uv sync --package protspace --no-dev

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run bundle format contract
        run: pnpm test:contract
