name: protspace Publish

# Dispatched by protspace-release.yml after a version bump. Publishes the
# protspace + protlabel PyPI packages from apps/protspace. PyPI trusted
# publishing still needs a live dry-run — OpenSpec task 3.4.
#
# The legacy Dash image was retired in fec6a2cb — do not re-add; it had no
# consumer once the Render deployment went away.

on:
  repository_dispatch:
    types: [trigger-publish]

defaults:
  run:
    working-directory: apps/protspace

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/protspace
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'apps/protspace/pyproject.toml'

      # Build ONLY protspace + protlabel (lock-step). NOT --all-packages: that
      # also builds the private apps/prep member and lands dist/ at the workspace
      # root, not apps/protspace/dist. --package can't repeat, so build each into
      # the same working-directory dist/.
      - name: Build Python Packages (protspace + protlabel)
        run: |
          uv build --package protlabel --out-dir dist
          uv build --package protspace --out-dir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/protspace/dist

      - name: Upload dists to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.client_payload.tag }} dist/* --clobber
