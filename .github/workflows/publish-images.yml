name: Publish container images

on:
  push:
    branches: [main]
    # No tag trigger: protspace releases push `v*` tags to THIS repo, and the
    # prep image must not build/publish on them (it deploys by digest on main,
    # and a `v4.7.1` tag would otherwise mint a mislabeled protspace-prep image).
  pull_request:
    paths:
      - 'apps/prep/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: protspace-prep
            context: .
            dockerfile: apps/prep/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}', matrix.name) || format('type=gha,mode=max,scope={0}-pr-{1}', matrix.name, github.ref) }}

  deploy:
    name: Pin digest in deploy repo
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Mint deploy-repo token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: Rostlab
          repositories: deploy-protspace-backend

      - name: Checkout deploy repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: Rostlab/deploy-protspace-backend
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Pin image digest and push
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          test -n "$DIGEST" || { echo "no digest from build job" >&2; exit 1; }

          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"

          printf 'PREP_IMAGE_DIGEST=%s\n' "$DIGEST" > image.env

          # Under `set -e`, `git diff --quiet` exits 1 when there ARE changes, so
          # the `if` form (not `|| exit 0`) is required to not abort on every update.
          if git diff --quiet; then
            echo "Digest unchanged; nothing to deploy."
            exit 0
          fi
          git add image.env
          git commit -m "deploy: protspace-prep @${DIGEST}"
          git push origin main
