name: Publish

on:
  repository_dispatch:
    types: [trigger-publish]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/protspace
    permissions:
      id-token: write
      contents: write
    env:
      UV_TOOL_DIR: /tmp/.uv-tools
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Restore uv tools
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-tools
          key: uv-tools-${{ runner.os }}-psr-v9.11.1
          restore-keys: |
            uv-tools-${{ runner.os }}-psr-v9.11.1
            uv-tools-${{ runner.os }}

      - name: Install Python Semantic Release
        run: uv tool install python-semantic-release@v9.11.1

      - name: Build Python Package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv tool run --from python-semantic-release semantic-release publish --tag ${{ github.event.client_payload.tag }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.client_payload.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.client_payload.tag }}
            type=semver,pattern={{major}},value=${{ github.event.client_payload.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
