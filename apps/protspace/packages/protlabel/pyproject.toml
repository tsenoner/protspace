[project]
name = "protlabel"
version = "4.8.0"
description = "Embedding Annotation Transfer (EAT): nearest-neighbour label transfer in protein-language-model embedding space"
authors = [{ name = "Tobias Senoner", email = "tobias.senoner@tum.de" }]
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.23.0",
]

[project.urls]
Homepage = "https://protspace.app"
Repository = "https://github.com/tsenoner/protspace"
Documentation = "https://protspace.app/docs/"
Issues = "https://github.com/tsenoner/protspace/issues"
Changelog = "https://github.com/tsenoner/protspace/blob/main/apps/protspace/CHANGELOG.md"




[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/protlabel"]
